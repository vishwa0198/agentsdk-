server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # ── WebSocket connections (must come before the REST catch-all) ──────────
    location /ws/ {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }

    # ── All FastAPI REST routes ───────────────────────────────────────────────
    location ~ ^/(health|auth|chat|sessions|memory|upload|mcp|pipelines|monitor|schedules|webhook) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow large file uploads (matches MAX_FILE_BYTES = 20 MB)
        client_max_body_size 25m;
    }

    # ── React SPA — serve static assets, fall back to index.html ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
