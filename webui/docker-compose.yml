version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      # Set to 1 if you do NOT have Docker-in-Docker available for run_python sandboxing.
      # - AGENTSDK_UNSAFE_PYTHON=1
    volumes:
      # Persist checkpoints and ChromaDB data across restarts.
      - ./data/checkpoints:/app/.agentsdk/checkpoints
      - ./data/chroma:/app/.agentsdk/chroma
      # Mount the Docker socket so the backend can spin up sandbox containers.
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
