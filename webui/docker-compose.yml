services:
  backend:
    build:
      context: ..
      dockerfile: webui/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      # Copy .env.example → .env and fill in your values before running.
      - .env
    environment:
      # Ensures the backend container can reach Ollama running on the host.
      # Docker Desktop (Windows/Mac) resolves host.docker.internal automatically.
      # On Linux add `--add-host=host.docker.internal:host-gateway` or set to your host IP.
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    volumes:
      # Persist checkpoints and ChromaDB data across restarts.
      - ./data/checkpoints:/app/.agentsdk/checkpoints
      - ./data/chroma:/app/.agentsdk/chroma
      # Mount the Docker socket so the backend can spin up sandbox containers.
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
