name: Deploy docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install mkdocs mkdocs-material "mkdocstrings[python]" pydantic httpx aiofiles groq typer rich
      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
